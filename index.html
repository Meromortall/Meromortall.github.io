<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life RPG</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="avatar-small" id="sidebarAvatar">⚔️</div>
                <div class="sidebar-title">Life RPG</div>
            </div>
            <div class="sidebar-nav" id="sidebarNav"></div>
        </nav>

        <!-- Conteúdo Principal -->
        <main class="main-content">
            <header class="top-header" id="topHeader"></header>
            <div class="content-area" id="contentArea"></div>
        </main>
    </div>

    <!-- Timer overlay -->
    <div class="timer-overlay" id="timerOverlay" style="display: none;">
        <div class="timer-card">
            <div class="timer-icon">⏱️</div>
            <div class="timer-display" id="timerDisplay">00:00:00</div>
            <button class="btn btn-danger" onclick="Timer.stop()">Parar</button>
        </div>
    </div>

    <script src="js/config/constants.js"></script>
    <script src="js/config/missions.js"></script>
    <script src="js/config/shop.js"></script>
    <script src="js/config/challenges.js"></script>
    <script src="js/config/classes.js"></script>
    <script src="js/core/points.js"></script>
    <script src="js/core/state.js"></script>
    <script src="js/core/timer.js"></script>
    <script src="js/core/notifications.js"></script>
    <script src="js/ui/toast.js"></script>
    <script src="js/ui/sidebar.js"></script>
    <script src="js/ui/header.js"></script>
    <script src="js/ui/missions.js"></script>
    <script src="js/ui/shop.js"></script>
    <script src="js/ui/challenges.js"></script>
    <script src="js/ui/character.js"></script>
    <script src="js/ui/analytics.js"></script>
    <script src="js/ui/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
